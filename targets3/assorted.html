<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RV Targets • Assorted</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="targets-data.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <!-- NAVBAR -->
    <nav class="border-b border-zinc-800 bg-zinc-950 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-violet-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl logo-font">RV</div>
                <h1 class="logo-font text-3xl tracking-tighter font-semibold text-white">RV Targets</h1>
            </div>
            <div class="flex items-center gap-x-8 text-sm font-medium">
                <a href="index.html" class="hover:text-violet-400 transition-colors">Home</a>
                <a href="practice.html" class="hover:text-violet-400 transition-colors">Practice</a>
                <a href="assorted.html" class="text-violet-400 font-semibold">Assorted</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-16">
        <div class="flex justify-between items-end mb-8">
            <div>
                <span class="uppercase text-xs tracking-[2px] text-amber-400 font-medium">Vault</span>
                <h1 class="text-5xl font-semibold logo-font tracking-tighter">Assorted Targets</h1>
            </div>
            <a href="index.html" class="text-sm flex items-center gap-x-2 hover:text-zinc-400 transition-colors">← Back</a>
        </div>

        <!-- DISCLAIMER -->
        <div class="bg-amber-900/30 border border-amber-400/30 rounded-3xl p-6 mb-12 text-sm">
            <strong class="text-amber-400">DISCLAIMER:</strong> 
            The targets in this section range from mundane everyday objects to highly esoteric and abstract concepts. 
            Some may challenge your perceptual limits. Use at your own discretion for remote viewing practice.
        </div>

        <div id="assorted-list" class="space-y-4">
            <!-- Populated by JS -->
        </div>
    </div>

    <script>
        function renderAssortedTargets() {
            const container = document.getElementById('assorted-list');
            const data = window.remoteViewingTargets || {};
            
            const assortedIds = Object.keys(data)
                .filter(id => data[id].category === 'assorted')
                .sort();
            
            let html = '';
            assortedIds.forEach((id, index) => {
                html += `
                    <a href="target.html?id=${id}" 
                       class="group block bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 hover:border-amber-500 transition-all rounded-3xl p-8 flex items-center justify-between">
                        <div class="flex items-center gap-x-8">
                            <div class="w-12 h-12 bg-zinc-800 text-zinc-400 font-mono text-xl flex items-center justify-center rounded-2xl group-hover:bg-amber-900 transition-colors">
                                ${String(index + 1).padStart(2, '0')}
                            </div>
                            <div>
                                <div class="font-mono text-3xl tracking-widest text-white">${id}</div>
                                <div class="text-xs text-zinc-500 mt-1">CLICK TO ENTER TARGET</div>
                            </div>
                        </div>
                        <div class="text-amber-400 text-4xl group-hover:translate-x-2 transition-transform">→</div>
                    </a>
                `;
            });
            
            container.innerHTML = html;
        }
        
        window.onload = renderAssortedTargets;
    </script>
</body>
</html>
