<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RV Targets - Target Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&amp;family=IBM+Plex+Mono:wght@400;600&amp;display=swap');
        body { font-family: 'Space Grotesk', sans-serif; }
        .mono { font-family: 'IBM Plex Mono', monospace; }
        .feedback-img { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .feedback-img:hover { transform: scale(1.03); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <!-- NAV -->
    <nav class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-violet-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">RV</div>
                <span class="text-3xl font-semibold tracking-tighter">RV Targets</span>
            </div>
            <div class="flex gap-x-8 text-lg">
                <a href="index.html" class="hover:text-violet-400 transition-colors">Home</a>
                <a href="practice.html" class="hover:text-violet-400 transition-colors">Practice Targets</a>
                <a href="assorted.html" class="hover:text-violet-400 transition-colors">Assorted Targets</a>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-6 py-16">
        <div id="target-header" class="mb-12">
            <div class="inline-flex items-center gap-x-3 bg-zinc-900 px-8 py-3 rounded-3xl border border-zinc-700">
                <span class="text-emerald-400 text-sm tracking-[3px]">TARGET</span>
                <span id="target-id-display" class="mono text-5xl font-semibold text-violet-400">xxxx-xxxx</span>
            </div>
        </div>

        <button id="reveal-button"
                class="w-full bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-500 hover:to-fuchsia-500 transition-all text-2xl font-medium py-8 rounded-3xl flex items-center justify-center gap-x-4 shadow-2xl shadow-violet-950">
            <span>REVEAL FEEDBACK</span>
            <span class="text-4xl">👁️</span>
        </button>

        <!-- FEEDBACK SECTION (hidden until clicked) -->
        <div id="feedback-section" class="hidden mt-16">
            <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-10">
                <h2 class="text-3xl font-medium mb-10 text-center tracking-tight">Feedback</h2>
                
                <!-- Photos -->
                <div id="photos-container" class="mb-12 grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                
                <!-- Written Cue -->
                <div id="cue-container" class="bg-black/40 border border-zinc-700 rounded-2xl p-8">
                    <div class="uppercase text-xs tracking-widest text-zinc-500 mb-3">WRITTEN CUE</div>
                    <p id="cue-text" class="text-2xl leading-relaxed text-zinc-300"></p>
                </div>
            </div>

            <div class="flex justify-center mt-10">
                <button onclick="window.history.back()" 
                        class="text-zinc-400 hover:text-white flex items-center gap-x-2 text-lg">
                    ← Back to target list
                </button>
            </div>
        </div>
    </div>

    <footer class="bg-zinc-900 py-8 border-t border-zinc-800 mt-20">
        <div class="max-w-6xl mx-auto px-6 text-center text-zinc-500 text-sm">
            Demo website for remote viewing practice • All images &amp; cues are placeholders
        </div>
    </footer>

    <script>
        // Sample target database (xxxx-xxxx format)
        const targetsDB = {
            "1000-0001": {
                photos: ["https://picsum.photos/id/1015/900/600"],
                cue: "A fresh red apple resting on a rustic wooden table bathed in soft natural window light."
            },
            "1000-0002": {
                photos: ["https://picsum.photos/id/201/900/600"],
                cue: "The Eiffel Tower in Paris, viewed from below on a clear sunny afternoon with tourists in the foreground."
            },
            "1000-0003": {
                photos: ["https://picsum.photos/id/29/900/600", "https://picsum.photos/id/30/900/600"],
                cue: "A crystal-clear mountain lake reflecting snow-capped peaks under a bright blue sky."
            },
            "1000-0004": {
                photos: ["https://picsum.photos/id/160/900/600"],
                cue: "A vibrant city street filled with yellow taxis and towering skyscrapers at rush hour."
            },
            "2000-0001": {
                photos: ["https://picsum.photos/id/101/900/600"],
                cue: "The ancient Stonehenge monument standing silently at sunrise with mist rolling across the plain."
            },
            "2000-0002": {
                photos: ["https://picsum.photos/id/251/900/600"],
                cue: "A glowing crystal orb levitating above an ornate esoteric altar inside a candle-lit stone chamber."
            },
            "2000-0003": {
                photos: ["https://picsum.photos/id/180/900/600"],
                cue: "The Great Pyramid of Giza rising from golden desert sands beneath a star-filled night sky."
            },
            "2000-0004": {
                photos: ["https://picsum.photos/id/201/900/600"],
                cue: "A sleek metallic spacecraft docked at an orbital station with planet Earth glowing in the background."
            }
        };

        // Get target ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        let targetId = urlParams.get('id') || 'xxxx-xxxx';

        const targetDisplay = document.getElementById('target-id-display');
        const revealBtn = document.getElementById('reveal-button');
        const feedbackSection = document.getElementById('feedback-section');
        const photosContainer = document.getElementById('photos-container');
        const cueText = document.getElementById('cue-text');

        targetDisplay.textContent = targetId;

        const targetData = targetsDB[targetId];

        if (targetData) {
            // Pre-load content (still hidden)
            // Photos
            if (targetData.photos && targetData.photos.length > 0) {
                targetData.photos.forEach((src) => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.alt = `Feedback image for ${targetId}`;
                    img.className = 'feedback-img w-full rounded-2xl shadow-2xl border border-zinc-700';
                    photosContainer.appendChild(img);
                });
            } else {
                const placeholder = document.createElement('p');
                placeholder.textContent = 'No photos provided for this target.';
                placeholder.className = 'text-zinc-400 italic';
                photosContainer.appendChild(placeholder);
            }

            // Cue
            if (targetData.cue) {
                cueText.textContent = targetData.cue;
            } else {
                document.getElementById('cue-container').style.display = 'none';
            }

            // Reveal button action
            revealBtn.addEventListener('click', () => {
                feedbackSection.classList.remove('hidden');
                revealBtn.style.opacity = '0.3';
                revealBtn.style.pointerEvents = 'none';
                revealBtn.innerHTML = `FEEDBACK REVEALED <span class="text-3xl">✅</span>`;
            });
        } else {
            // Placeholder or unknown ID handling
            revealBtn.innerHTML = `TARGET ID ${targetId} NOT IN DEMO DATABASE`;
            revealBtn.disabled = true;
            revealBtn.classList.add('!bg-zinc-800', '!text-zinc-400');
            
            const msg = document.createElement('div');
            msg.innerHTML = `
                <div class="mt-12 text-center p-8 bg-zinc-900 rounded-3xl border border-zinc-700">
                    <p class="text-2xl text-amber-300">This is the placeholder target format (xxxx-xxxx)</p>
                    <p class="mt-6 text-zinc-400">Return to the Practice or Assorted pages and click a real Target ID to see full feedback.</p>
                </div>
            `;
            document.querySelector('.max-w-5xl').appendChild(msg);
        }
    </script>
</body>
</html>
