<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Remote Viewing Targets</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #111;
      color: #eee;
    }

    h1, h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    /* Grid layout for lists */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    /* Buttons & targets */
    .button, .target {
      display: block;
      padding: 14px;
      background: #222;
      border: 1px solid #444;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      color: #eee;
      border-radius: 10px;
      transition: all 0.2s ease;
      font-size: 16px;
    }

    .button:hover, .target:hover {
      background: #333;
      transform: scale(1.02);
    }

    .hidden {
      display: none;
    }

    img {
      max-width: 100%;
      margin-top: 12px;
      border-radius: 10px;
    }

    /* Tablet */
    @media (min-width: 600px) {
      body {
        padding: 24px;
      }

      .grid {
        grid-template-columns: 1fr 1fr;
      }

      .button, .target {
        font-size: 17px;
      }
    }

    /* Desktop */
    @media (min-width: 900px) {
      .grid {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .container {
        max-width: 1000px;
      }

      h1 {
        font-size: 2.5em;
      }

      h2 {
        font-size: 2em;
      }
    }
  </style>
</head>
<body>

<div class="container" id="app"></div>

<script>
const app = document.getElementById("app");

const targets = {
  practice: Array.from({ length: 6 }, (_, i) => ({
    id: `xxxx-xxxx-${i + 1}`,
    text: "A calm natural scene with water and trees.",
    image: "https://via.placeholder.com/600x400"
  })),
  assorted: Array.from({ length: 6 }, (_, i) => ({
    id: `xxxx-xxxx-${i + 7}`,
    text: "An unusual or abstract target.",
    image: "https://via.placeholder.com/600x400"
  }))
};

function navigate(path) {
  location.hash = path;
}

function getRoute() {
  return location.hash.slice(1) || "/";
}

function Home() {
  app.innerHTML = `
    <h1>Remote Viewing Targets</h1>
    <div class="grid">
      <div class="button" onclick="navigate('/practice')">Practice Targets</div>
      <div class="button" onclick="navigate('/assorted')">Assorted Targets</div>
    </div>
  `;
}

function TargetList(type) {
  const list = targets[type];

  app.innerHTML = `
    <h2>${type.charAt(0).toUpperCase() + type.slice(1)} Targets</h2>
    <div class="button" onclick="navigate('/')">← Back</div>
    <div class="grid">
      ${list.map((t, i) => `
        <div class="target" onclick="navigate('/target/${t.id}')">
          ${i + 1}. ${t.id}
        </div>
      `).join("")}
    </div>
  `;
}

function TargetPage(id) {
  const all = [...targets.practice, ...targets.assorted];
  const target = all.find(t => t.id === id);

  if (!target) {
    app.innerHTML = `<h2>Target not found</h2>`;
    return;
  }

  app.innerHTML = `
    <h2>Target ID: ${id}</h2>
    <div class="button" onclick="navigate('/')">← Home</div>
    <div class="button" onclick="document.getElementById('feedback').classList.toggle('hidden')">
      Reveal Feedback
    </div>
    <div id="feedback" class="hidden">
      <p>${target.text}</p>
      <img src="${target.image}" />
    </div>
  `;
}

function router() {
  const route = getRoute();

  if (route === "/") return Home();
  if (route === "/practice") return TargetList("practice");
  if (route === "/assorted") return TargetList("assorted");

  if (route.startsWith("/target/")) {
    const id = route.split("/")[2];
    return TargetPage(id);
  }

  Home();
}

window.addEventListener("hashchange", router);
router();
</script>

</body>
</html>
